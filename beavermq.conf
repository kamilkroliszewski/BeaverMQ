# BeaverMQ configuration file.
# Lines are "key = value"; everything after '#' is a comment.
# Precedence: built-in defaults < this file < BEAVERMQ_* environment variables.

# Number of worker threads (event loops). Each handles a share of the
# connections on its own CPU core. Use "auto" to match the available cores.
threads = auto
# threads = 4

# AMQP 0-9-1 listener port.
amqp_port = 5672

# HTTP management API / dashboard port.
http_port = 15672

# Address to bind the AMQP, HTTP management, and (if clustering is on) mesh
# listeners to. Loopback-only by default: BeaverMQ only supports SASL PLAIN
# for AMQP and HTTP Basic for the management API, both sent in PLAINTEXT, and
# there is no TLS support yet. Only change this to 0.0.0.0 (or a specific
# non-loopback address) if you are ALSO putting a TLS-terminating reverse
# proxy or VPN (e.g. WireGuard) in front of every one of these ports - and,
# if clustering is on, only after setting cluster_secret below (otherwise any
# host that can reach the mesh port can impersonate a cluster node).
bind = 127.0.0.1

# Logging verbosity: debug | info | warn | error
log_level = info

# Forming cluster
cluster = off
node_id = 0
cluster_nodes = 127.0.0.1:6672
data_dir = /var/lib/beavermq/storage

# Shared secret authenticating the mesh handshake between cluster nodes -
# REQUIRED (and must be identical on every node) whenever cluster = on; the
# broker refuses to start without it. Prefer setting it via the
# BEAVERMQ_CLUSTER_SECRET environment variable instead of this file so it
# doesn't end up in a config file that might get committed/shared.
# cluster_secret = change-me-to-a-long-random-value
