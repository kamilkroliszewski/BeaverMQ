name: CI

# Runs inside a debian:13 (Trixie) container so the toolchain matches the
# development/target environment - in particular libuv >= 1.49, which provides
# UV_TCP_REUSEPORT (Ubuntu 24.04's libuv 1.48 does not, so a plain ubuntu-latest
# runner fails to build src/net.c).

on:
  push:
    branches: ["**"]
  pull_request:

env:
  # Base packages every job needs: git + certs so actions/checkout works in the
  # container; the build toolchain and library headers; and curl + procps
  # (pgrep) which `make test` needs to run tests/test_supervisor.sh.
  BASE_DEPS: build-essential git ca-certificates libuv1-dev libjansson-dev curl procps

jobs:
  unit:
    name: Unit tests (release)
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: apt-get update && apt-get install -y $BASE_DEPS
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Unit tests
        run: make test

  sanitizers:
    name: Unit tests (ASan + UBSan)
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: apt-get update && apt-get install -y $BASE_DEPS
      - uses: actions/checkout@v4
      - name: Unit tests under ASan/UBSan
        run: make test-asan

  valgrind:
    name: Unit tests (Valgrind)
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: apt-get update && apt-get install -y $BASE_DEPS valgrind
      - uses: actions/checkout@v4
      - name: Build test binaries (release)
        run: make test   # builds AND runs the release unit tests
      - name: Valgrind on unit test binaries
        run: |
          set -e
          # Fast, allocation-focused suites only; the heavy ones (test_routing's
          # 100k-message thread stress, test_fuzz_frame's 400k iterations) are
          # covered by the ASan job instead - under Valgrind they would time out.
          for t in build/test_frame build/test_logger build/test_authlimit; do
            echo "--- valgrind $t ---"
            valgrind --error-exitcode=1 --leak-check=full --errors-for-leak-kinds=definite "$t"
          done

  process-tests:
    name: Supervisor + cluster failover
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: apt-get update && apt-get install -y $BASE_DEPS
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Supervisor crash/respawn
        run: bash tests/test_supervisor.sh
      - name: Cluster leader election + failover
        run: bash tests/test_cluster.sh
      - name: Storage fault injection (WAL/snapshot fail-stop)
        run: make fault-test

  integration:
    name: AMQP + management integration
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y $BASE_DEPS python3 python3-pip python3-venv
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Integration suite (pika + management API)
        run: make integration

  fuzz:
    name: Fuzz frame parser (libFuzzer, 60s)
    runs-on: ubuntu-latest
    container: debian:13
    steps:
      - name: Install deps
        run: apt-get update && apt-get install -y $BASE_DEPS clang
      - uses: actions/checkout@v4
      - name: Build fuzzer
        run: make fuzz
      - name: Run fuzzer
        run: ./build/fuzz_frame -max_total_time=60 -print_final_stats=1
